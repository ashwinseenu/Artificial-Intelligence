# ─────────────────────────────────────────────────────────────
#  CodeGemma Local AI Stack  (7b + virtual RAM / swap mode)
#  • Ollama  — model server  → http://localhost:11434
#  • Open WebUI — browser UI → http://localhost:3000
# ─────────────────────────────────────────────────────────────

services:

  # ── 1. Ollama model server ─────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=5m          # Unload after 5 min idle → frees RAM back
      - OLLAMA_NUM_PARALLEL=1         # 1 request at a time → lower RAM pressure
      - OLLAMA_MAX_LOADED_MODELS=1    # Never load 2 models at once
      - OLLAMA_FLASH_ATTENTION=1      # Reduces memory footprint during inference
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 20s

  # ── 2. Model initialiser (runs once, then exits) ───────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      sh -c "
        echo '>>> Pulling qwen2.5-coder:7b (this may take several minutes)...' &&
        ollama pull qwen2.5-coder:7b &&
        echo '>>> Model ready!'
      "
    environment:
      - OLLAMA_HOST=ollama:11434

  # ── 3. Open WebUI — browser chat interface ─────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - open_webui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=change-me-in-production
      - WEBUI_AUTH=false
      - DEFAULT_MODELS=qwen2.5-coder:7b
      - ENABLE_RAG_WEB_SEARCH=true
      - ENABLE_IMAGE_GENERATION=false
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health > /dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 300s

# ─── Persistent Volumes ────────────────────────────────────
volumes:
  ollama_data:
    name: ollama_data
  open_webui_data:
    name: open_webui_data
